<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Thêm Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="">
    <!-- Modal Overlay -->
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <!-- Modal Content -->
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full max-h-[90vh] overflow-y-auto">
            
            <!-- Header -->
            <div class="flex justify-between items-center p-6 border-b">
                <h2 class="text-2xl font-medium text-gray-800">Thêm món mới</h2>
                <button class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <!-- Form -->
            <form class="p-6 space-y-4">
                
                <!-- Tên món -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Tên món <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        name="name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                        placeholder="Nhập tên món"
                    />
                </div>

                <!-- Giá -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Giá (VNĐ) <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="number"
                        name="price"
                        min="0"
                        class="w-full px-4 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                        placeholder="50000"
                    />
                </div>

                <!-- Danh mục -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Danh mục <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        name="categoryId"
                        class="w-full px-4 py-2 border border-gray-300 rounded-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                        placeholder="Cà phê, Trà sữa,..."
                    />
                </div>

               

                <!-- Hình ảnh -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Hình ảnh
                    </label>
                    <div class="space-y-3">
                        <label class="flex items-center justify-center w-full px-4 py-3 border-2 border-dashed border-gray-300 rounded-sm cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors">
                            <svg class="w-5 h-5 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <span class="text-gray-600 font-medium">Chọn hình ảnh</span>
                            <input
                                type="file"
                                accept="image/*"
                                name="picture"
                                class="hidden"
                            />
                        </label>
                        
                        
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 pt-4">
                    <button
                        type="button"
                        class="flex-1 px-4 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-semibold transition-colors"
                    >
                        Hủy
                    </button>
                    <button
                        type="button"
                        class="flex-1 px-4 py-3 bg-blue-500 hover:bg-blue-700 text-white rounded-lg font-semibold transition-colors"
                    >
                        Thêm món
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
